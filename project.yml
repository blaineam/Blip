name: Blip
options:
  bundleIdPrefix: com.blainemiller
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
settings:
  base:
    SWIFT_VERSION: "6.0"
    ARCHS: arm64
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  Blip:
    type: application
    platform: macOS
    sources:
      - path: Blip/Sources
      - path: Blip/Resources/Assets.xcassets
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blainemiller.Blip
        INFOPLIST_FILE: Blip/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Blip/Resources/Blip.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        PRODUCT_NAME: Blip
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
    frameworks:
      - sdk: IOKit.framework
